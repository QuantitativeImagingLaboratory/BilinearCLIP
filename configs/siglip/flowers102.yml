.dataset_defaults: &ds_defaults
  dataset: "flowers102"
  n_shot: 16

.model_defaults: &m_defaults
  backbone: 'ViT-B-16-SigLIP'
  upper_triangle: True

.training_defaults: &t_defaults
  epochs: 30
  loss: "siglip"
  optimizer: "adamw"
  lr: 1e-4
  weight_decay: 0.1
  save_best: False

16_shot_vit16:
  Dataset:
    <<: *ds_defaults
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    weight_decay: 2
    lr: 8e-4
    epochs: 30

8_shot_vit16:
  Dataset:
    <<: *ds_defaults
    n_shot: 8
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    weight_decay: 5e-2
    lr: 8e-4
    epochs: 20

4_shot_vit16:
  Dataset:
    <<: *ds_defaults
    n_shot: 4
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    weight_decay: 5e-2
    lr: 8e-4
    epochs: 20

2_shot_vit16:
  Dataset:
    <<: *ds_defaults
    n_shot: 2
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    weight_decay: 5e-2
    lr: 8e-4
    epochs: 20

1_shot_vit16:
  Dataset:
    <<: *ds_defaults
    n_shot: 1
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    weight_decay: 5e-2
    lr: 8e-4
    epochs: 20

16_shot_rn50:
  Dataset:
    <<: *ds_defaults
  Model:
    <<: *m_defaults
    backbone: 'RN50'
  Training:
    <<: *t_defaults


