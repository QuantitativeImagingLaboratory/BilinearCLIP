.dataset_defaults: &ds_defaults
  dataset: "flowers102"
  n_shot: 16

.model_defaults: &m_defaults
  backbone: 'ViT-B/16'
  upper_triangle: True

.training_defaults: &t_defaults
  epochs: 100
  loss: "contrastive"
  optimizer: "adamw"
  lr: 1e-4
  weight_decay: 0.1
  save_best: False

16_shot_vit16:
  Dataset:
    <<: *ds_defaults
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    lr: 8e-4
    weight_decay: 5e-2
    epochs: 25

16_shot_rn50:
  Dataset:
    <<: *ds_defaults
  Model:
    <<: *m_defaults
    backbone: 'RN50'
  Training:
    <<: *t_defaults


