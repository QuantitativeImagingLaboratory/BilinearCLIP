.dataset_defaults: &ds_defaults
  dataset: "imagenet"
  n_shot: 16

.model_defaults: &m_defaults
  backbone: 'ViT-B/16'
  upper_triangle: True

.training_defaults: &t_defaults
  epochs: 50
  loss: "contrastive"
  optimizer: "adamw"
  lr: 1e-4
  weight_decay: 0.1
  save_best: False

16_shot_vit16:
  Dataset:
    <<: *ds_defaults
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    lr: 5e-5
    weight_decay: 0.5
    epochs: 30
#    lr_scheduler: "cosine+warmup"

8_shot_vit16:
  Dataset:
    <<: *ds_defaults
    n_shot: 8
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    lr: 5e-5
    weight_decay: 0.5
    epochs: 30


4_shot_vit16:
