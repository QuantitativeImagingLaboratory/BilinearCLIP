    <<: *ds_defaults
    n_shot: 4
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    lr: 5e-5
    weight_decay: 0.5
    epochs: 30

2_shot_vit16:
  Dataset:
    <<: *ds_defaults
