1_shot_vit16:
  Dataset:
    <<: *ds_defaults
    n_shot: 1
  Model:
    <<: *m_defaults
  Training:
    <<: *t_defaults
    lr: 2e-3
    weight_decay: 0.1
    epochs: 20

16_shot_rn50:
  Dataset:
    <<: *ds_defaults
  Model:
    <<: *m_defaults
    backbone: 'RN50'
  Training:
    <<: *t_defaults


16_shot_vit16_ablation_1:
  Dataset:
    <<: *ds_defaults
  Model:
    <<: *m_defaults
    upper_triangle: False
    w_initialization: "random"
